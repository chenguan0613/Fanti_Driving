name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Fanti_Driving-linux
            binary_path: dist/Fanti_Driving
            data_sep: ":"
            pyinstaller_cache: ~/.cache/pyinstaller
          - os: windows-latest
            artifact_name: Fanti_Driving-windows
            binary_path: dist/Fanti_Driving.exe
            data_sep: ";"
            pyinstaller_cache: ~\AppData\Local\pyinstaller
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: ${{ matrix.pyinstaller_cache }}
          key: pyinstaller-${{ matrix.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pyinstaller-${{ matrix.os }}-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1 libxcb-shm0 libxcb-xfixes0 libxcb-shape0 \
            libxcb-randr0 libxcb-render-util0 libxcb-render0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxext6 libsm6 \
            libgl1 libegl1 libgles2 libgl1-mesa-dri \
            libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --name Fanti_Driving \
            --paths . \
            --add-data "templates${{ matrix.data_sep }}templates" \
            --add-data "static${{ matrix.data_sep }}static" \
            --add-data "models${{ matrix.data_sep }}models" \
            --add-data "face_landmarker.task${{ matrix.data_sep }}." \
            --collect-all sklearn \
            --hidden-import joblib \
            --hidden-import src \
            --hidden-import src.realtime \
            --hidden-import src.realtime.predictor \
            --hidden-import src.realtime.buffer \
            --hidden-import src.preprocessing \
            --hidden-import src.preprocessing.frame_extractor \
            --hidden-import src.features \
            --hidden-import src.features.window_agg \
            --hidden-import src.features.frame_schema \
            --collect-all mediapipe \
            --collect-all cv2 \
            scripts/app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: Fanti_Driving-linux
          path: release

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Fanti_Driving-windows
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Fanti_Driving
            release/Fanti_Driving.exe
          generate_release_notes: true
